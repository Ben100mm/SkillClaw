name: Scrape Skills.sh

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install httpx pyyaml beautifulsoup4

      - name: Scrape skills.sh for new high-rated skills
        id: scrape
        run: |
          python scripts/scrape_skills.py
        env:
          SKILLS_DIR: skills_library

      - name: Check for new skills
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard skills_library/)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add new high-rated skills from skills.sh"
          title: "feat: new skills from skills.sh community library"
          body: |
            ## Automated Skills.sh Scrape

            This PR adds new high-rated skills discovered on [skills.sh](https://skills.sh).

            **Review each skill file** in `skills_library/` before merging to ensure
            quality and relevance.

            ---
            _Generated by the skills.sh scraper workflow._
          branch: scraper/new-skills
          delete-branch: true
          labels: |
            automated
            skills
